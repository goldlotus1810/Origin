<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeOS · Silk Web Tree</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box }
    html,body { width:100%; height:100%; background:#020308; overflow:hidden }
    #frame {
      position:fixed; inset:0;
      border:none; width:100%; height:100%;
    }
    #badge {
      position:fixed; top:12px; right:16px; z-index:10;
      font:11px/1.6 monospace;
      color:rgba(120,180,255,.6);
      pointer-events:none;
    }
    #badge a {
      color:rgba(120,180,255,.45);
      text-decoration:none;
      pointer-events:auto;
    }
    #badge a:hover { color:rgba(160,210,255,.9) }
  </style>
</head>
<body>
  <!--
    HomeOS ISDF renderer (tree3d.html) được embed trong iframe.
    Khi serve từ Go (http://localhost:8080/):
      /               → index.html (file này)
      /tree3d.html    → tree3d.html (ISDF engine)
      /renderer.js    → renderer.js (production engine)
      /api/tree       → nodes JSON
      /api/edges      → edges JSON
      /ws/sse         → WorldSnapshot SSE 20fps
  -->
  <iframe id="frame" src="/tree3d.html" allowfullscreen></iframe>
  <div id="badge">
    HomeOS ○ &nbsp;|&nbsp;
    <a href="/health" target="_blank">health</a> &nbsp;|&nbsp;
    <a href="/api/tree" target="_blank">tree</a> &nbsp;|&nbsp;
    <a href="/api/edges" target="_blank">edges</a>
  </div>
</body>
</html>
